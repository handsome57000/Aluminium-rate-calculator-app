      background-size: 20px 20px, 20px 20px, 100px 100px, 100px 100px;
      background-position: -1px -1px, -1px -1px, -1px -1px, -1px -1px;
    }

    /* TOAST ANIMATION */
    @keyframes slideUpFade {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }

    .toast-anim { animation: slideUpFade 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      render() {
        if (this.state.hasError) {
          return (
            <div className="p-6 bg-red-50 text-red-700 min-h-screen">
              <h2 className="text-2xl font-bold mb-4">Oops! App Crashed.</h2>
              <pre className="bg-white p-4 rounded border border-red-200 text-xs overflow-auto">{this.state.error.toString()}</pre>
            </div>
          );
        }
        return this.props.children; 
      }
    }

    const IconPlus = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
    const IconChevronDown = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>;
    const IconCalc = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="14.01"></line><line x1="16" y1="18" x2="16" y2="18.01"></line><line x1="12" y1="14" x2="12" y2="14.01"></line><line x1="12" y1="18" x2="12" y2="18.01"></line><line x1="8" y1="14" x2="8" y2="14.01"></line><line x1="8" y1="18" x2="8" y2="18.01"></line></svg>;
    const IconDG = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>;
    const IconEdit = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
    const IconPDF = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
    const IconUser = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
    const IconSave = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;
    const IconRefresh = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-9.28l5.67-5.67"/></svg>;
    const IconShare = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>;
    const IconCopy = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;

    // Toast Notification Component
    const Toast = ({ message, type = 'success', onClose }) => {
      useEffect(() => { const timer = setTimeout(onClose, 3000); return () => clearTimeout(timer); }, [message]);
      if (!message) return null;
      return (
        <div className="fixed top-5 left-1/2 -translate-x-1/2 z-[100] toast-anim w-11/12 max-w-sm">
          <div className={`p-4 rounded-2xl shadow-2xl flex items-center gap-3 text-white font-bold text-sm ${type==='success'?'bg-emerald-600':'bg-rose-600'}`}>
            <div className="bg-white/20 p-1.5 rounded-full">{type==='success'?<IconSave/>:<IconTrash/>}</div>
            {message}
          </div>
        </div>
      );
    };

    const InputField = ({ label, type = "text", value, onChange, placeholder }) => (
      <div className="mb-4">
        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">{label}</label>
        <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 text-slate-800 font-medium focus:outline-none focus:ring-2 focus:ring-teal-500 focus:bg-white transition-all shadow-sm" />
      </div>
    );

    const catalogColors = {
      "Dull/Silver": ["Dull Silver", "Silver Smooth"],
      "Champagne/PC": [
        "GR 9001 HG", "GR 9003 HG", "GR 9016 HG (White)", "GR 9016 DM", "GR 9003 DM",
        "GR 9017 HG", "GR 9011 HG", "GR 7102 HG", "GR 9010 HG", "GR 9104 HG",
        "GR 9103 HG", "GR 1100 HG", "GR 1015 HG", "GR 1002 HG", "GR 4100 SM",
        "GR 7006 SM", "GR 7001 HG", "GR 7032 HG", "GR 7012 HG", "GR 7021 HG",
        "GR 7024 HG", "GR 7038 HG", "GR 7041 HG", "GR 7047 SM", "GR 7024 EDM",
        "GR 8705 SM", "GR 8007 HG", "GR 8017 HG", "GR 8019 HG", "GR 5102 HG",
        "GR 5012 HG", "GR 5103 HG", "GR 5104 HG", "GR 5002 HG", "GR 5005 HG",
        "GR 5011 HG", "GR 5019 EDM", "GR 6101 HG", "GR 6102 HG", "GR 6001 HG",
        "GR 6025 HG", "GR 6029 HG", "GR 6005 HG", "GR 4003 HG", "GR 1006 HG",
        "GR 2008 HG", "GR 2004 HG", "GR 3002 HG", "GR 3004 HG", "GR 3027 HG",
        "GR 9005 HG", "GR 9005 SM (S)", "GR MX 9005 SM", "GR PP 9005 SM", "GR 9005 DM",
        "GR 9005 EDM", "GR 9101 ST", "GR 7047 ST", "GR 1017 ST", "GR 8001 ST"
      ],
      "Sahara/Brown": [
        "GR 8003 ST", "GR 8011 ST", "GR 8012 ST", "GR 7024 ST", "GR 9005 ST",
        "GR Sahara Champagne", "GR Aztec Grey", "GR Atlantis Grey", "GR Diamond Blue", "GR Silver Smooth",
        "GR Golden Smooth", "GR Silver Antique", "GR Golden Antique", "GR 9003 T", "GR 1100 CT",
        "GR 7035 CT", "GR 7035 KT", "GR 7038 CT", "GR 7032 (120T)", "GR 7032 PCT",
        "GR 7000 CT", "GR 7102 CT", "GR 7104 CT", "GR 7024 CT", "GR 2008 CT",
        "GR 2004 CT", "GR 5012 CT", "GR 3100 T", "GR 9005 CT", "GR 9005 MCT"
      ],
      "Multi/Black": [
        "Multi Golden", "Multi Blue", "Multi Gray", "Multi Black", "Multi Green"
      ],
      "Wood Coat": [
        "Wood 915", "Wood 116", "Wood 115", "Wood 107", "Wood 816", "Wood 817",
        "Wood 806", "Wood 905", "Wood Greige", "Wood 917", "Wood 815", "Wood 133",
        "Wood 935", "Wood 916", "Wood 807"
      ]
    };

    const glassColorOptions = [
      { name: 'Clear', idSuffix: 'clear', bg: 'bg-slate-200' },
      { name: 'Dark Blue', idSuffix: 'blue', bg: 'bg-blue-800' },
      { name: 'Sky Blue', idSuffix: 'lightblue', bg: 'bg-blue-400' },
      { name: 'Bronze/Brown', idSuffix: 'brown', bg: 'bg-amber-800' },
      { name: 'Ref Green', idSuffix: 'green', bg: 'bg-emerald-700' },
      { name: 'Blackish Grey', idSuffix: 'grey', bg: 'bg-slate-800' },
      { name: 'Ribbed Clear', idSuffix: 'pattern', bg: 'bg-slate-200' },
      { name: 'Ribbed Blue', idSuffix: 'pattern-blue', bg: 'bg-blue-600' },
      { name: 'Ribbed Green', idSuffix: 'pattern-green', bg: 'bg-emerald-600' },
      { name: 'Ribbed Black', idSuffix: 'pattern-black', bg: 'bg-slate-900' }
    ];

    const sheetColorOptions = [
      { name: 'DLX-1001 (Silver)', hex: '#cbd5e1' }, { name: 'DLX-1002 (Light Grey)', hex: '#e2e8f0' },
      { name: 'DLX-1003 (Metallic)', hex: '#d6d3d1' }, { name: 'DLX-1004 (Gold)', hex: '#fde047' },
      { name: 'DLX-1005 (Copper)', hex: '#d97706' }, { name: 'DLX-1006 (Dark Grey)', hex: '#475569' },
      { name: 'DLX-1007 (White)', hex: '#ffffff' }, { name: 'DLX-1008 (Black)', hex: '#0f172a' },
      { name: 'DLX-1009 (Red)', hex: '#ef4444' }, { name: 'DLX-1010 (Yellow)', hex: '#eab308' },
      { name: 'DLX-1011 (Dark Blue)', hex: '#1d4ed8' }, { name: 'DLX-1012 (Green)', hex: '#059669' },
      { name: 'DLX-1013 (Orange)', hex: '#f97316' }, { name: 'DLX-1014 (Blue)', hex: '#3b82f6' },
      { name: 'DLX-1015 (Dark Red)', hex: '#b91c1c' }, { name: 'DLX-1016 (Ice White)', hex: '#f8fafc' },
      { name: 'DLX-1017 (Off White)', hex: '#fef08a' }, { name: 'DLX-1018 (Cream)', hex: '#fef3c7' },
      { name: 'DLX-1019 (Beige)', hex: '#fde68a' }, { name: 'DLX-1020 (Pink)', hex: '#ec4899' },
      { name: 'DLX-1021 (Purple)', hex: '#8b5cf6' }, { name: 'DLX-1022 (Grey)', hex: '#94a3b8' },
      { name: 'DLX-1023 (Brushed Silver)', hex: '#9ca3af' }, { name: 'DLX-1024 (Brushed Gold)', hex: '#ca8a04' }
    ];

    // --- PROPORTIONAL CAD VISUALIZER ---
    const Visualizer = ({ id, w, h, type, panelQty, hasArch, archType, archHeight, colorCategory, specificColor, panelMaterial, glassColor, sheetColor, isMercury, dividerWQty, dividerHQty, dividerType, mini = false }) => {
      const widthFt = parseFloat(w) || 4;
      const heightFt = parseFloat(h) || 4;
      
      let aHFt = 0;
      if (hasArch && type !== 'DG') {
          if (archType === 'Full Round') aHFt = widthFt / 2;
          else {
              aHFt = parseFloat(archHeight) || 0;
              if (aHFt > widthFt/2) aHFt = widthFt/2;
          }
      }
      const totalHFt = heightFt + aHFt;
      
      const uid = useMemo(() => id || Math.random().toString(36).substring(2, 9), [id]);

      const maxDim = 12; 
      const widthPercent = Math.min((widthFt / maxDim) * 100, 100);
      const heightPercent = Math.min((totalHFt / maxDim) * 100, 100);
      
      const finalWPercent = mini ? 100 : Math.max(widthPercent, 25);
      const finalHPercent = mini ? 100 : Math.max(heightPercent, 25);

      const previewRatio = widthFt / totalHFt;
      let svgW = 400; let svgH = 400 / previewRatio;
      
      const archH_px = aHFt > 0 ? svgH * (aHFt / totalHFt) : 0;
      const mainH_px = svgH - archH_px;
      
      const frameThickness = 18; const sashThickness = 14;
      const isDouble = panelQty === '2'; 

      const getProfileUrl = () => {
        const spec = specificColor || '';
        if (colorCategory === 'Wood Coat') {
          if (spec.match(/107|817|917|905|807|133|935|816/)) return `url(#wood-dark-${uid})`;
          return `url(#wood-light-${uid})`; 
        }
        if (colorCategory === 'Multi/Black') {
          if (spec.includes('Golden')) return `url(#multi-golden-${uid})`;
          if (spec.includes('Blue')) return `url(#pc-blue-${uid})`;
          if (spec.includes('Gray')) return `url(#pc-grey-${uid})`;
          if (spec.includes('Green')) return `url(#pc-green-${uid})`;
          return `url(#pc-black-${uid})`;
        }
        if (colorCategory === 'Champagne/PC' || colorCategory === 'Sahara/Brown') {
          if (spec.match(/9001|9003|9016|9010|9104|9101|1017|White|Champagne/i)) return `url(#pc-white-${uid})`;
          if (spec.match(/9005|7021|8705|Black/i)) return `url(#pc-black-${uid})`;
          if (spec.match(/7\d{3}|Grey|Silver/i)) return `url(#pc-grey-${uid})`;
          if (spec.match(/8\d{3}|4100|Brown/i)) return `url(#pc-brown-${uid})`;
          if (spec.match(/5\d{3}|Blue|Atlantis/i)) return `url(#pc-blue-${uid})`;
          if (spec.match(/6\d{3}|Green/i)) return `url(#pc-green-${uid})`;
          if (spec.match(/3\d{3}|2004|2008|Red|Orange/i)) return `url(#pc-red-${uid})`;
          if (spec.match(/1006|1100|1015|1002|Golden|Yellow/i)) return `url(#pc-yellow-${uid})`;
          return `url(#champagne-${uid})`; 
        }
        return `url(#dull-silver-${uid})`;
      };

      const getPanelFill = () => {
        if (panelMaterial === 'Sheet') return sheetColor;
        const selected = glassColorOptions.find(g => g.name === glassColor);
        return selected ? `url(#glass-${selected.idSuffix}-${uid})` : `url(#glass-clear-${uid})`;
      };

      const DrawDividers = ({ innerW, innerH }) => {
        const dW = parseInt(dividerWQty) || 0;
        const dH = parseInt(dividerHQty) || 0;
        const lines = [];
        let strokeW = "0.5";
        let thick = 8;
        if(dividerType === 'D-52') thick = 12;
        if(dividerType === 'D-59' || dividerType === 'D-40' || dividerType === 'D-59A') thick = 10;
        for(let i=1; i<=dW; i++) {
          let y = (innerH / (dW + 1)) * i;
          lines.push(<rect key={`h${i}`} x="0" y={y-(thick/2)} width={innerW} height={thick} fill={getProfileUrl()} stroke="rgba(0,0,0,0.5)" strokeWidth={strokeW} filter={`url(#drop-shadow-${uid})`} />);
        }
        for(let j=1; j<=dH; j++) {
          let x = (innerW / (dH + 1)) * j;
          lines.push(<rect key={`v${j}`} x={x-(thick/2)} y="0" width={thick} height={innerH} fill={getProfileUrl()} stroke="rgba(0,0,0,0.5)" strokeWidth={strokeW} filter={`url(#drop-shadow-${uid})`} />);
        }
        return <g>{lines}</g>;
      };

      const wrapperClasses = mini 
          ? "w-full h-full flex justify-center items-center bg-transparent overflow-hidden relative" 
          : "w-full h-72 bg-blueprint rounded-t-3xl border-b-4 border-slate-800 shadow-inner overflow-hidden relative flex justify-center items-center p-4";

      const viewBoxStr = mini ? `-10 -10 ${svgW + 20} ${svgH + 20}` : `-60 -50 ${svgW + 120} ${svgH + 110}`;

      return (
        <div className={wrapperClasses}>
          <div style={{ width: `${finalWPercent}%`, height: `${finalHPercent}%`, maxWidth: '100%', maxHeight: '100%', display: 'flex', justifyContent: 'center', alignItems: 'center' }}>
            <svg width="100%" height="100%" viewBox={viewBoxStr} preserveAspectRatio="xMidYMid meet" style={{ filter: mini ? 'drop-shadow(0px 2px 4px rgba(0,0,0,0.15))' : 'drop-shadow(0px 15px 25px rgba(0,0,0,0.5))'}}>
              <defs>
                <linearGradient id={`glass-clear-${uid}`} x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stopColor="#94a3b8" /><stop offset="45%" stopColor="#e2e8f0" /><stop offset="50%" stopColor="#ffffff" /><stop offset="55%" stopColor="#cbd5e1" /><stop offset="100%" stopColor="#64748b" /></linearGradient>
                <linearGradient id={`glass-blue-${uid}`} x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stopColor="#0f172a" /><stop offset="35%" stopColor="#1e3a8a" /><stop offset="48%" stopColor="#2563eb" /><stop offset="50%" stopColor="#bfdbfe" /><stop offset="52%" stopColor="#1d4ed8" /><stop offset="100%" stopColor="#020617" /></linearGradient>
                <linearGradient id={`glass-brown-${uid}`} x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stopColor="#290e01" /><stop offset="35%" stopColor="#451a03" /><stop offset="48%" stopColor="#92400e" /><stop offset="50%" stopColor="#fef3c7" /><stop offset="52%" stopColor="#b45309" /><stop offset="100%" stopColor="#290e01" /></linearGradient>
                <linearGradient id={`glass-grey-${uid}`} x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stopColor="#020617" /><stop offset="35%" stopColor="#1e293b" /><stop offset="48%" stopColor="#475569" /><stop offset="50%" stopColor="#e2e8f0" /><stop offset="52%" stopColor="#334155" /><stop offset="100%" stopColor="#020617" /></linearGradient>
                <linearGradient id={`glass-green-${uid}`} x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stopColor="#064e3b" /><stop offset="35%" stopColor="#065f46" /><stop offset="48%" stopColor="#10b981" /><stop offset="50%" stopColor="#d1fae5" /><stop offset="52%" stopColor="#059669" /><stop offset="100%" stopColor="#022c22" /></linearGradient>
                <linearGradient id={`glass-lightblue-${uid}`} x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stopColor="#1e3a8a" /><stop offset="35%" stopColor="#3b82f6" /><stop offset="50%" stopColor="#e0f2fe" /><stop offset="100%" stopColor="#0f172a" /></linearGradient>
                
                <pattern id={`glass-pattern-${uid}`} width="60" height="60" patternUnits="userSpaceOnUse"><rect width="60" height="60" fill="#e2e8f0"/><path d="M0,30 Q15,0 30,30 T60,30" fill="none" stroke="#94a3b8" strokeWidth="2" opacity="0.8"/><path d="M30,0 Q60,15 30,60 T0,60" fill="none" stroke="#94a3b8" strokeWidth="2" opacity="0.8"/><circle cx="30" cy="30" r="5" fill="#64748b" opacity="0.5" /></pattern>
                
                <linearGradient id={`mercury-glare-${uid}`} x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="30%" stopColor="rgba(255,255,255,0)" /><stop offset="45%" stopColor="rgba(255,255,255,0.7)" /><stop offset="50%" stopColor="rgba(255,255,255,0.9)" /><stop offset="55%" stopColor="rgba(255,255,255,0.4)" /><stop offset="70%" stopColor="rgba(255,255,255,0)" /></linearGradient>

                <linearGradient id={`dull-silver-${uid}`} x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#cbd5e1" /><stop offset="50%" stopColor="#f1f5f9" /><stop offset="100%" stopColor="#94a3b8" /></linearGradient>
                <linearGradient id={`champagne-${uid}`} x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#d4b483" /><stop offset="50%" stopColor="#fef3c7" /><stop offset="100%" stopColor="#b48b52" /></linearGradient>
                <linearGradient id={`pc-white-${uid}`} x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#e2e8f0" /><stop offset="50%" stopColor="#ffffff" /><stop offset="100%" stopColor="#cbd5e1" /></linearGradient>
                <linearGradient id={`pc-black-${uid}`} x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#0f172a" /><stop offset="50%" stopColor="#334155" /><stop offset="100%" stopColor="#020617" /></linearGradient>
                <linearGradient id={`pc-brown-${uid}`} x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#451a03" /><stop offset="50%" stopColor="#78350f" /><stop offset="100%" stopColor="#290e01" /></linearGradient>
                <linearGradient id={`pc-grey-${uid}`} x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#334155" /><stop offset="50%" stopColor="#64748b" /><stop offset="100%" stopColor="#1e293b" /></linearGradient>
                
                <linearGradient id={`pc-blue-${uid}`} x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#1e3a8a" /><stop offset="50%" stopColor="#3b82f6" /><stop offset="100%" stopColor="#172554" /></linearGradient>
                <linearGradient id={`pc-green-${uid}`} x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#065f46" /><stop offset="50%" stopColor="#10b981" /><stop offset="100%" stopColor="#022c22" /></linearGradient>
                <linearGradient id={`pc-red-${uid}`} x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#7f1d1d" /><stop offset="50%" stopColor="#ef4444" /><stop offset="100%" stopColor="#450a0a" /></linearGradient>
                <linearGradient id={`pc-yellow-${uid}`} x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#a16207" /><stop offset="50%" stopColor="#fde047" /><stop offset="100%" stopColor="#713f12" /></linearGradient>

                <linearGradient id={`wood-light-${uid}`} x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#92400e" /><stop offset="30%" stopColor="#d97706" /><stop offset="70%" stopColor="#b45309" /><stop offset="100%" stopColor="#78350f" /></linearGradient>

                <linearGradient id={`multi-golden-${uid}`} x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#ca8a04" /><stop offset="50%" stopColor="#fef08a" /><stop offset="100%" stopColor="#854d0e" /></linearGradient>

                {/* Arch Clip Path */}
                {archH_px > 0 && (
                  <clipPath id={`arch-clip-${uid}`}>
                    <path d={`M 0,${archH_px} A ${(archH_px/2) + (svgW*svgW)/(8*archH_px)} ${(archH_px/2) + (svgW*svgW)/(8*archH_px)} 0 0 1 ${svgW},${archH_px} Z`} />

              <rect x="0" y="0" width={svgW} height={svgH} fill={mini ? "rgba(0,0,0,0.02)" : "#0f172a"} />

              {!mini && (
                <g className="dimensions text-teal-300" style={{userSelect: 'none', filter: 'drop-shadow(0px 2px 2px rgba(0,0,0,0.8))'}}>
                  <path d={`M 0 -25 L ${svgW} -25 M 0 -35 L 0 -15 M ${svgW} -35 L ${svgW} -15`} fill="none" stroke="currentColor" strokeWidth="2" />
                  <text x={svgW/2} y="-35" fill="currentColor" fontSize="24" fontWeight="900" textAnchor="middle">{w || 4}' (W)</text>
                  
                  <path d={`M -25 0 L -25 ${svgH} M -35 0 L -15 0 M -35 ${svgH} L -15 ${svgH}`} fill="none" stroke="currentColor" strokeWidth="2" />
                  <text x="-35" y={svgH/2} fill="currentColor" fontSize="24" fontWeight="900" textAnchor="middle" transform={`rotate(-90, -35, ${svgH/2})`}>{totalHFt.toFixed(1)}' (Total H)</text>
                </g>
              )}

              {/* ARCH SECTION DRAWING */}
              {archH_px > 0 && (
                <g>
                   {/* Arch Glass and Frame */}
                   <path d={`M 0,${archH_px} A ${(archH_px/2) + (svgW*svgW)/(8*archH_px)} ${(archH_px/2) + (svgW*svgW)/(8*archH_px)} 0 0 1 ${svgW},${archH_px} Z`} fill={getPanelFill()} stroke={getProfileUrl()} strokeWidth={frameThickness * 2} clipPath={`url(#arch-clip-${uid})`} />
                   {isMercury && panelMaterial==='Glass' && <path d={`M 0,${archH_px} A ${(archH_px/2) + (svgW*svgW)/(8*archH_px)} ${(archH_px/2) + (svgW*svgW)/(8*archH_px)} 0 0 1 ${svgW},${archH_px} Z`} fill={`url(#mercury-glare-${uid})`} clipPath={`url(#arch-clip-${uid})`} />}
                   
                   {/* Arch Base Divider */}
                   <rect x="0" y={archH_px - frameThickness} width={svgW} height={frameThickness * 2} fill={getProfileUrl()} />

                   {/* Divider line between arch and main window */}

                   {/* Outer Border for Arch */}

                      <path d={`M0,0 L${svgW/2 - frameThickness + 5},0 L${svgW/2 - frameThickness + 5},${mainH_px - frameThickness*2} L0,${mainH_px - frameThickness*2} Z M${sashThickness},${sashThickness} L${sashThickness},${mainH_px - frameThickness*2 - sashThickness} L${svgW/2 - frameThickness + 5 - sashThickness},${mainH_px - frameThickness*2 - sashThickness} L${svgW/2 - frameThickness + 5 - sashThickness},${sashThickness} Z`} fill={getProfileUrl()} stroke="rgba(0,0,0,0.5)" strokeWidth="1" />

                      <rect x={sashThickness} y={sashThickness} width={svgW/2 - frameThickness + 5 - sashThickness*2} height={mainH_px - frameThickness*2 - sashThickness*2} fill={getPanelFill()} />

                      <path d={`M0,0 L${svgW/2 - frameThickness + 5},0 L${svgW/2 - frameThickness + 5},${mainH_px - frameThickness*2} L0,${mainH_px - frameThickness*2} Z M${sashThickness},${sashThickness} L${sashThickness},${mainH_px - frameThickness*2 - sashThickness} L${svgW/2 - frameThickness + 5 - sashThickness},${mainH_px - frameThickness*2 - sashThickness} L${svgW/2 - frameThickness + 5 - sashThickness},${sashThickness} Z`} fill={getProfileUrl()} stroke="rgba(0,0,0,0.5)" strokeWidth="1" />
                    </g>

                    <rect x="0" y="0" width={svgW} height={mainH_px} fill="none" stroke="#020617" strokeWidth="2" />

                    <g transform={`translate(${frameThickness}, ${frameThickness})`}><DrawDividers innerW={svgW - frameThickness*2} innerH={mainH_px - frameThickness*2} /></g>
                    <path d={`M0,0 L${svgW},0 L${svgW},${mainH_px} L0,${mainH_px} Z M${frameThickness},${frameThickness} L${frameThickness},${mainH_px-frameThickness} L${svgW-frameThickness},${mainH_px-frameThickness} L${svgW-frameThickness},${frameThickness} Z`} fill={getProfileUrl()} stroke="rgba(0,0,0,0.5)" strokeWidth="1.5" />
                    <rect x="0" y="0" width={svgW} height={mainH_px} fill="none" stroke="#020617" strokeWidth="2" />
                  </g>
                )}

                {type === 'Openable' && (
                  <g>
                    {isDouble ? (
                      <g transform={`translate(${frameThickness}, ${frameThickness})`}>
                        <g>
                          <rect x={sashThickness} y={sashThickness} width={(svgW - frameThickness*2)/2 - sashThickness*1.5} height={mainH_px - frameThickness*2 - sashThickness*2} fill={getPanelFill()} />
                          {isMercury && panelMaterial==='Glass' && <rect x={sashThickness} y={sashThickness} width={(svgW - frameThickness*2)/2 - sashThickness*1.5} height={mainH_px - frameThickness*2 - sashThickness*2} fill={`url(#mercury-glare-${uid})`} />}
                          <g transform={`translate(${sashThickness}, ${sashThickness})`}><DrawDividers innerW={(svgW - frameThickness*2)/2 - sashThickness*1.5} innerH={mainH_px - frameThickness*2 - sashThickness*2} /></g>
                          <path d={`M0,0 L${(svgW - frameThickness*2)/2},0 L${(svgW - frameThickness*2)/2},${mainH_px - frameThickness*2} L0,${mainH_px - frameThickness*2} Z M${sashThickness},${sashThickness} L${sashThickness},${mainH_px - frameThickness*2 - sashThickness} L${(svgW - frameThickness*2)/2 - sashThickness*0.5},${mainH_px - frameThickness*2 - sashThickness} L${(svgW - frameThickness*2)/2 - sashThickness*0.5},${sashThickness} Z`} fill={getProfileUrl()} stroke="rgba(0,0,0,0.5)" strokeWidth="1" />
                          <rect x={(svgW - frameThickness*2)/2 - 20} y={(mainH_px - frameThickness*2)/2 - 20} width={8} height={40} fill="#1e293b" rx="3" filter={`url(#drop-shadow-${uid})`} />
                        </g>
                        <g transform={`translate(${(svgW - frameThickness*2)/2}, 0)`}>
                          <rect x={sashThickness*0.5} y={sashThickness} width={(svgW - frameThickness*2)/2 - sashThickness*1.5} height={mainH_px - frameThickness*2 - sashThickness*2} fill={getPanelFill()} />
                          {isMercury && panelMaterial==='Glass' && <rect x={sashThickness*0.5} y={sashThickness} width={(svgW - frameThickness*2)/2 - sashThickness*1.5} height={mainH_px - frameThickness*2 - sashThickness*2} fill={`url(#mercury-glare-${uid})`} />}
                          <g transform={`translate(${sashThickness*0.5}, ${sashThickness})`}><DrawDividers innerW={(svgW - frameThickness*2)/2 - sashThickness*1.5} innerH={mainH_px - frameThickness*2 - sashThickness*2} /></g>
                          <path d={`M0,0 L${(svgW - frameThickness*2)/2},0 L${(svgW - frameThickness*2)/2},${mainH_px - frameThickness*2} L0,${mainH_px - frameThickness*2} Z M${sashThickness*0.5},${sashThickness} L${sashThickness*0.5},${mainH_px - frameThickness*2 - sashThickness} L${(svgW - frameThickness*2)/2 - sashThickness},${mainH_px - frameThickness*2 - sashThickness} L${(svgW - frameThickness*2)/2 - sashThickness},${sashThickness} Z`} fill={getProfileUrl()} stroke="rgba(0,0,0,0.5)" strokeWidth="1" />
                          <rect x={12} y={(mainH_px - frameThickness*2)/2 - 20} width={8} height={40} fill="#1e293b" rx="3" filter={`url(#drop-shadow-${uid})`} />
                        </g>
                      </g>
                    ) : (
                      <g transform={`translate(${frameThickness}, ${frameThickness})`}>
                        <rect x={sashThickness} y={sashThickness} width={svgW - frameThickness*2 - sashThickness*2} height={mainH_px - frameThickness*2 - sashThickness*2} fill={getPanelFill()} />
                        {isMercury && panelMaterial==='Glass' && <rect x={sashThickness} y={sashThickness} width={svgW - frameThickness*2 - sashThickness*2} height={mainH_px - frameThickness*2 - sashThickness*2} fill={`url(#mercury-glare-${uid})`} />}
                        <g transform={`translate(${sashThickness}, ${sashThickness})`}><DrawDividers innerW={svgW - frameThickness*2 - sashThickness*2} innerH={mainH_px - frameThickness*2 - sashThickness*2} /></g>
                        <path d={`M0,0 L${svgW - frameThickness*2},0 L${svgW - frameThickness*2},${mainH_px - frameThickness*2} L0,${mainH_px - frameThickness*2} Z M${sashThickness},${sashThickness} L${sashThickness},${mainH_px - frameThickness*2 - sashThickness} L${svgW - frameThickness*2 - sashThickness},${mainH_px - frameThickness*2 - sashThickness} L${svgW - frameThickness*2 - sashThickness},${sashThickness} Z`} fill={getProfileUrl()} stroke="rgba(0,0,0,0.5)" strokeWidth="1" />
                        <rect x={svgW - frameThickness*2 - 25} y={(mainH_px - frameThickness*2)/2 - 20} width={8} height={40} fill="#1e293b" rx="3" filter={`url(#drop-shadow-${uid})`} />
                      </g>

                    <path d={`M0,0 L${svgW},0 L${svgW},${mainH_px} L0,${mainH_px} Z M${frameThickness},${frameThickness} L${frameThickness},${mainH_px-frameThickness} L${svgW-frameThickness},${mainH_px-frameThickness} L${svgW-frameThickness},${frameThickness} Z`} fill={getProfileUrl()} stroke="rgba(0,0,0,0.5)" strokeWidth="1.5" />
                    <rect x="0" y="0" width={svgW} height={mainH_px} fill="none" stroke="#020617" strokeWidth="2" />
                  </g>

                {type === 'Door' && (
                  <g>
                    {isDouble ? (
                      <g transform={`translate(${frameThickness}, ${frameThickness})`}>
                        <g>
                          <rect x={sashThickness} y={sashThickness} width={(svgW - frameThickness*2)/2 - sashThickness*1.5} height={mainH_px - frameThickness*2 - sashThickness*2} fill={getPanelFill()} />
                          {isMercury && panelMaterial==='Glass' && <rect x={sashThickness} y={sashThickness} width={(svgW - frameThickness*2)/2 - sashThickness*1.5} height={mainH_px - frameThickness*2 - sashThickness*2} fill={`url(#mercury-glare-${uid})`} />}
                          <g transform={`translate(${sashThickness}, ${sashThickness})`}><DrawDividers innerW={(svgW - frameThickness*2)/2 - sashThickness*1.5} innerH={mainH_px - frameThickness*2 - sashThickness*2} /></g>
                          <rect x={sashThickness} y={(mainH_px - frameThickness*2)/2 - 15} width={(svgW - frameThickness*2)/2 - sashThickness*1.5} height={30} fill={getProfileUrl()} filter={`url(#drop-shadow-${uid})`} />
                          <rect x={sashThickness} y={mainH_px - frameThickness*2 - 80} width={(svgW - frameThickness*2)/2 - sashThickness*1.5} height={80 - sashThickness} fill={getProfileUrl()} />
                          <path d={`M0,0 L${(svgW - frameThickness*2)/2},0 L${(svgW - frameThickness*2)/2},${mainH_px - frameThickness*2} L0,${mainH_px - frameThickness*2} Z M${sashThickness},${sashThickness} L${sashThickness},${mainH_px - frameThickness*2 - sashThickness} L${(svgW - frameThickness*2)/2 - sashThickness*0.5},${mainH_px - frameThickness*2 - sashThickness} L${(svgW - frameThickness*2)/2 - sashThickness*0.5},${sashThickness} Z`} fill={getProfileUrl()} stroke="rgba(0,0,0,0.5)" strokeWidth="1" />
                          <rect x={(svgW - frameThickness*2)/2 - 25} y={(mainH_px - frameThickness*2)/2 - 30} width={10} height={60} fill="#1e293b" rx="3" filter={`url(#drop-shadow-${uid})`} />
                        </g>
                        <g transform={`translate(${(svgW - frameThickness*2)/2}, 0)`}>
                          <rect x={sashThickness*0.5} y={sashThickness} width={(svgW - frameThickness*2)/2 - sashThickness*1.5} height={mainH_px - frameThickness*2 - sashThickness*2} fill={getPanelFill()} />
                          {isMercury && panelMaterial==='Glass' && <rect x={sashThickness*0.5} y={sashThickness} width={(svgW - frameThickness*2)/2 - sashThickness*1.5} height={mainH_px - frameThickness*2 - sashThickness*2} fill={`url(#mercury-glare-${uid})`} />}
                          <g transform={`translate(${sashThickness*0.5}, ${sashThickness})`}><DrawDividers innerW={(svgW - frameThickness*2)/2 - sashThickness*1.5} innerH={mainH_px - frameThickness*2 - sashThickness*2} /></g>
                          <rect x={sashThickness*0.5} y={(mainH_px - frameThickness*2)/2 - 15} width={(svgW - frameThickness*2)/2 - sashThickness*1.5} height={30} fill={getProfileUrl()} filter={`url(#drop-shadow-${uid})`} />
                          <rect x={sashThickness*0.5} y={mainH_px - frameThickness*2 - 80} width={(svgW - frameThickness*2)/2 - sashThickness*1.5} height={80 - sashThickness} fill={getProfileUrl()} />
                          <path d={`M0,0 L${(svgW - frameThickness*2)/2},0 L${(svgW - frameThickness*2)/2},${mainH_px - frameThickness*2} L0,${mainH_px - frameThickness*2} Z M${sashThickness*0.5},${sashThickness} L${sashThickness*0.5},${mainH_px - frameThickness*2 - sashThickness} L${(svgW - frameThickness*2)/2 - sashThickness},${mainH_px - frameThickness*2 - sashThickness} L${(svgW - frameThickness*2)/2 - sashThickness},${sashThickness} Z`} fill={getProfileUrl()} stroke="rgba(0,0,0,0.5)" strokeWidth="1" />
                          <rect x={15} y={(mainH_px - frameThickness*2)/2 - 30} width={10} height={60} fill="#1e293b" rx="3" filter={`url(#drop-shadow-${uid})`} />
                        </g>
                      </g>
                    ) : (
                      <g transform={`translate(${frameThickness}, ${frameThickness})`}>
                        <rect x={sashThickness} y={sashThickness} width={svgW - frameThickness*2 - sashThickness*2} height={mainH_px - frameThickness*2 - sashThickness*2} fill={getPanelFill()} />
                        {isMercury && panelMaterial==='Glass' && <rect x={sashThickness} y={sashThickness} width={svgW - frameThickness*2 - sashThickness*2} height={mainH_px - frameThickness*2 - sashThickness*2} fill={`url(#mercury-glare-${uid})`} />}
                        <g transform={`translate(${sashThickness}, ${sashThickness})`}><DrawDividers innerW={svgW - frameThickness*2 - sashThickness*2} innerH={mainH_px - frameThickness*2 - sashThickness*2} /></g>
                        <rect x={sashThickness} y={(mainH_px - frameThickness*2)/2 - 15} width={svgW - frameThickness*2 - sashThickness*2} height={30} fill={getProfileUrl()} filter={`url(#drop-shadow-${uid})`} />
                        <rect x={sashThickness} y={mainH_px - frameThickness*2 - 80} width={svgW - frameThickness*2 - sashThickness*2} height={80 - sashThickness} fill={getProfileUrl()} />
                        <line x1={sashThickness+10} y1={mainH_px - frameThickness*2 - 60} x2={svgW - frameThickness - sashThickness - 10} y2={mainH_px - frameThickness*2 - 60} stroke="rgba(0,0,0,0.5)" strokeWidth="1" />
                        <line x1={sashThickness+10} y1={mainH_px - frameThickness*2 - 40} x2={svgW - frameThickness - sashThickness - 10} y2={mainH_px - frameThickness*2 - 40} stroke="rgba(0,0,0,0.5)" strokeWidth="1" />
                        <path d={`M0,0 L${svgW - frameThickness*2},0 L${svgW - frameThickness*2},${mainH_px - frameThickness*2} L0,${mainH_px - frameThickness*2} Z M${sashThickness},${sashThickness} L${sashThickness},${mainH_px - frameThickness*2 - sashThickness} L${svgW - frameThickness*2 - sashThickness},${mainH_px - frameThickness*2 - sashThickness} L${svgW - frameThickness*2 - sashThickness},${sashThickness} Z`} fill={getProfileUrl()} stroke="rgba(0,0,0,0.5)" strokeWidth="1" />
                        <rect x={25} y={(mainH_px - frameThickness*2)/2 - 30} width={10} height={60} fill="#1e293b" rx="3" filter={`url(#drop-shadow-${uid})`} />
                      </g>
                    )}
                    <path d={`M0,0 L${svgW},0 L${svgW},${mainH_px} L0,${mainH_px} Z M${frameThickness},${frameThickness} L${frameThickness},${mainH_px-frameThickness} L${svgW-frameThickness},${mainH_px-frameThickness} L${svgW-frameThickness},${frameThickness} Z`} fill={getProfileUrl()} stroke="rgba(0,0,0,0.5)" strokeWidth="1.5" />
                    <rect x="0" y="0" width={svgW} height={mainH_px} fill="none" stroke="#020617" strokeWidth="2" />
                  </g>
                )}
              </g>
            </svg>
          </div>
        </div>
      );
    };

    const defaultRates = {

    function App() {
      const [activeTab, setActiveTab] = useState('dc');
      const [toast, setToast] = useState(null);

      const showToast = (msg, type='success') => setToast({ msg, type });

      const [rateList, setRateList] = useState(() => {
        const savedRates = localStorage.getItem('alumAppRatesDataV4');
        let parsed = defaultRates;
        if (savedRates) {
          try { 
            const oldRates = JSON.parse(savedRates);
            parsed = { ...defaultRates, ...oldRates }; 
          } catch (e) { console.error("Error", e); }
        }
        return parsed; 
      });

      const [profile, setProfile] = useState(() => {
        const savedProfile = localStorage.getItem('alumAppProfileData');
        if (savedProfile) {
          try { return JSON.parse(savedProfile); } catch (e) { console.error("Error", e); }
        }
        return {
          name: 'Sufyan Dhillon', mobile: '03086498828', shopName: 'Alhussan traders', shopContact: '03208484199', address: 'Gujranwala, Pakistan'
        };
      });

      const [input, setInput] = useState({
        type: 'Sliding', palla: '2', panelQty: '1', thickness: '1.2mm*75mm', w: '', h: '', qty: '', 
        doorFrame: 'D-54F', doorPalla: 'D-50A', doorMidRail: 'D-52', doorBottomRail: 'D-46',
        fixedFrame: 'D-54F', openableFrame: 'D-54F', openablePalla: 'D-50A',
        dgFrame: 'DG-26 F', dgPalla: 'DG-23',
        dividerWQty: '', dividerHQty: '', dividerType: 'M-24A',
        colorCategory: 'Champagne/PC', specificColor: 'GR 9016 HG (White)',
        panelMaterial: 'Glass', glassColor: 'Dark Blue', sheetColor: '#cbd5e1', isMercury: true,
        // NEW: Arch variables
        hasArch: false, archType: 'Full Round', archHeight: '', archFrame: 'D-54A', archThickness: '1.2mm'
      });

      const [items, setItems] = useState([]);
      const [billing, setBilling] = useState({ discountPct: '', glassRate: '', hardwareRate: '', laborRate: '', additional: '' });
      const [editSection, setEditSection] = useState('M-23 1.2mm');

      const handleCategoryChange = (cat) => setInput({...input, colorCategory: cat, specificColor: catalogColors[cat][0]});

      const fetchRate = (baseSec, thick) => {
        let targetKey = `${baseSec} ${thick}`;
        if (rateList[targetKey]) return { section: `${baseSec} (${thick})`, rate: rateList[targetKey][input.colorCategory] || 0 };
        if (rateList[`${baseSec} 1.2mm`]) return { section: `${baseSec} (1.2mm)`, rate: rateList[`${baseSec} 1.2mm`][input.colorCategory] || 0 };
        if (rateList[`${baseSec} 4mm`]) return { section: `${baseSec} (4mm)`, rate: rateList[`${baseSec} 4mm`][input.colorCategory] || 0 };
        return { section: baseSec, rate: 0 };
      };

      const handleAddItem = () => {
        if (!input.w || !input.h || !input.qty) return showToast("Please enter W, H, and Qty.", "error");
        
        const w = parseFloat(input.w); const h = parseFloat(input.h); const q = parseInt(input.qty);
        
        // Arch Geometry Calculations
        let ah = 0;
        if (input.hasArch && activeTab !== 'dg') {
            if (input.archType === 'Full Round') ah = w / 2;
            else {
                ah = parseFloat(input.archHeight) || 0;
                if (ah > w/2) ah = w/2; 
            }
        }
        const totalHeight = h + ah;
        const sqft = w * totalHeight * q; // Total Area (With Wastage Coverage)
        
        let materials = []; let sectionTotal = 0;

        const thickMatch = input.thickness.match(/(\d\.\d)mm/);
        const thick = thickMatch ? thickMatch[1] + 'mm' : '1.2mm';
        const isF = input.thickness.includes('F');
        const isC = input.thickness.includes('C');

        const divW = parseFloat(input.dividerWQty) || 0; 
        const divH = parseFloat(input.dividerHQty) || 0;
        
        let pallaCount = 1;
        if (input.type === 'Sliding' || activeTab === 'dg') {
            pallaCount = parseInt(input.palla) || 2;
        } else if (input.type === 'Door' || input.type === 'Openable') {
            pallaCount = parseInt(input.panelQty) || 1;
        }

        const totalDividerFt = (divW * w) + (divH * h * pallaCount);

        if (activeTab === 'dg') {
            const frameChoice = input.dgFrame || 'DG-26 F';
            const pallaChoice = input.dgPalla || 'DG-23';
            const isDgF = frameChoice.includes('F');
            const frameFt = isDgF ? ((w + 0.25) * 2) + ((h + 0.25) * 2) : (w * 2) + (h * 2);
            materials = [
                { ...fetchRate(frameChoice, thick), ft: frameFt * q },
                { ...fetchRate(pallaChoice, thick), ft: ((h*4)+(w*2)) * q },
                { ...fetchRate('DG-28', thick), ft: (h*2) * q },
                { ...fetchRate('DG-29', thick), ft: ((h*2)+w) * q }
            ];
            if (totalDividerFt > 0) {
              materials.push({ ...fetchRate(input.dividerType, thick), ft: totalDividerFt * q });
              if (input.dividerType === 'D-40' || input.dividerType === 'D-59' || input.dividerType === 'D-59A') materials.push({ ...fetchRate('D-41', thick), ft: (totalDividerFt * 2) * q }); 
            }
        } else {
            // Main structure framing
            if (input.type === 'Fixed') {
              const frameChoice = input.fixedFrame || 'D-54F';
              const isFixedF = frameChoice.includes('F');
              let frameFt = isFixedF ? ((w + 0.25) * 2) + ((h + 0.25) * 2) : (w * 2) + (h * 2); 
              materials = [
                { ...fetchRate(frameChoice, thick), ft: frameFt * q },
                { ...fetchRate('D-41', thick), ft: ((w * 2) + (h * 2)) * q }
              ];
              if (totalDividerFt > 0) {
                materials.push({ ...fetchRate(input.dividerType, thick), ft: totalDividerFt * q });
                if (input.dividerType === 'D-40' || input.dividerType === 'D-59' || input.dividerType === 'D-59A') materials.push({ ...fetchRate('D-41', thick), ft: (totalDividerFt * 2) * q }); 
              }
            } else if (input.type === 'Openable') {
              const frameChoice = input.openableFrame || 'D-54F'; const pallaChoice = input.openablePalla || 'D-50A';
              const isOpenableF = frameChoice.includes('F');
              let frameFt = isOpenableF ? ((w + 0.5) * 2) + ((h + 0.5) * 2) : (w * 2) + (h * 2); 
              let pallaFt = (w * 2) + (h * (pallaCount * 2)); 
              
              materials = [
                { ...fetchRate(frameChoice, thick), ft: frameFt * q },
                { ...fetchRate(pallaChoice, thick), ft: pallaFt * q }
              ];
              if (totalDividerFt > 0) {
                materials.push({ ...fetchRate(input.dividerType, thick), ft: totalDividerFt * q });
                if (input.dividerType === 'D-40' || input.dividerType === 'D-59' || input.dividerType === 'D-59A') materials.push({ ...fetchRate('D-41', thick), ft: (totalDividerFt * 2) * q }); 
              }
            } else if (input.type === 'Door') {
              const frameChoice = input.doorFrame || 'D-54F'; const pallaChoice = input.doorPalla || 'D-50A';
              let frameFt = (frameChoice === 'D-54F' || frameChoice === 'D-51F') ? (w + 0.5) + 2 * (h + 0.5) : w + (2 * h); 
              let pallaFt = w + (h * (pallaCount * 2)); 

              materials = [
                  { ...fetchRate(frameChoice, thick), ft: frameFt * q },
                  { ...fetchRate(pallaChoice, thick), ft: pallaFt * q },
                  { ...fetchRate(input.doorMidRail, thick), ft: w * q },
                  { ...fetchRate(input.doorBottomRail, thick), ft: w * q }
              ];
              if (totalDividerFt > 0) {
                materials.push({ ...fetchRate(input.dividerType, thick), ft: totalDividerFt * q });
                if (input.dividerType === 'D-40' || input.dividerType === 'D-59' || input.dividerType === 'D-59A') materials.push({ ...fetchRate('D-41', thick), ft: (totalDividerFt * 2) * q }); 
              }
            } else if (input.type === 'Sliding') {
              const is75mm = input.thickness.includes('75mm'); const is95mm = input.thickness.includes('95mm');
              let topSideOuterFt = isF ? w + (h * 2) + 1 : w + (h * 2); 
              let bottomOuterFt = isF ? w + 0.5 : w; 
              let topOuterSec = isF ? 'DC-30 F' : 'DC-30'; let bottomOuterSec = isF ? 'DC-26 F' : 'DC-26';

              if (is75mm) { topOuterSec = isF ? 'M-30 F' : 'M-30'; bottomOuterSec = isF ? 'M-26 F' : 'M-26'; } 
              else if (is95mm) { topOuterSec = 'DC-30B'; bottomOuterSec = 'DC-26B'; topSideOuterFt = w + (h * 2); bottomOuterFt = w; }
              else if (isC) { topOuterSec = 'DC-30C'; bottomOuterSec = 'DC-26C'; }

              materials = [
                { ...fetchRate(topOuterSec, thick), ft: topSideOuterFt * q },
                { ...fetchRate(bottomOuterSec, thick), ft: bottomOuterFt * q },
                { ...fetchRate('M-23', thick), ft: (h * 2) * q },
                { ...fetchRate('M-28', thick), ft: (h * 2) * q },
                { ...fetchRate('M-24', thick), ft: (w * 2) * q }
              ];

              if (!is75mm) materials.push({ ...fetchRate('D-29', thick), ft: (w + (h * 2)) * q });
              if (totalDividerFt > 0) {
                materials.push({ ...fetchRate(input.dividerType, thick), ft: totalDividerFt * q });
                if (input.dividerType === 'D-40' || input.dividerType === 'D-59' || input.dividerType === 'D-59A') materials.push({ ...fetchRate('D-41', thick), ft: (totalDividerFt * 2) * q }); 
              }
            }

            // --- ARCH MATERIAL LOGIC ---
            if (input.hasArch && ah > 0) {
                // Arc Length Formula: R = h/2 + w^2/(8h). Theta = 2 * arcsin(w/2R). Arc = R * Theta
                let radius = (ah/2) + ((w*w)/(8*ah));
                let theta = 2 * Math.asin(w / (2 * radius));
                let arcLength = radius * theta;
                
                let archCurveMat = arcLength + 1; // 1 ft extra cutting margin requested
                let archBaseMat = w; // Straight bottom part
                
                let totalArchFrameMat = archCurveMat + archBaseMat;
                let archThick = input.archThickness.match(/(\d\.\d)mm/)[1] + 'mm';
                
                // Arch Frame Section
                materials.push({ ...fetchRate(input.archFrame, archThick), ft: totalArchFrameMat * q });
                // Double D-41 in Arch (Curve + Base)
                materials.push({ ...fetchRate('D-41', archThick), ft: totalArchFrameMat * q });
            }
        }

        materials = materials.map(m => {
          const amount = m.rate * m.ft;
          sectionTotal += amount;
          return { ...m, amount };
        });

        const categoryLabel = activeTab === 'dg' ? 'DG' : 'DC';
        setItems([{ id: Date.now(), category: categoryLabel, ...input, w, h, ah, q, sqft, materials, sectionTotal }, ...items]);
        setInput({ ...input, w: '', h: '', qty: '', dividerWQty: '', dividerHQty: '' });
        showToast("Item added successfully!");
      };

      const removeItem = (id) => setItems(items.filter(i => i.id !== id));

      const handleRateChange = (section, colorCat, newRate) => {
        setRateList(prev => ({ ...prev, [section]: { ...prev[section], [colorCat]: parseFloat(newRate) || 0 } }));
      };

      const exportRates = () => {
        const code = btoa(JSON.stringify(rateList));
        navigator.clipboard.writeText(code);
        showToast("Rate Code copied! Share with friends.");
      };

      const importRates = () => {
        const code = prompt("Paste your friend's Rate Code here:");
        if (code) {
          try {
            const newRates = JSON.parse(atob(code));
            setRateList(newRates);
            localStorage.setItem('alumAppRatesDataV4', JSON.stringify(newRates));
            showToast("Rates updated successfully!");
          } catch(e) {
            showToast("Invalid Rate Code!", "error");
          }
        }
      };

      const resetRatesToDefault = () => {
        if(window.confirm("Restore default company rates? Your manual changes will be lost.")){
            setRateList(defaultRates);
            localStorage.setItem('alumAppRatesDataV4', JSON.stringify(defaultRates));
            showToast("Default rates restored.");
        }
      };

      const aggregatedMaterials = useMemo(() => {
        const map = {};
        items.forEach(item => {
          item.materials.forEach(m => {
            if (!map[m.section]) map[m.section] = { section: m.section, rate: m.rate, ft: 0, amount: 0 };
            map[m.section].ft += m.ft; map[m.section].amount += m.amount;
          });
        });
        return Object.values(map);
      }, [items]);

      const totals = useMemo(() => {
        let rawSubtotal = 0, fixedQty = 0, slidingQty = 0, doorQty = 0, openableQty = 0;
        let fixedSqft = 0, slidingSqft = 0, doorSqft = 0, openableSqft = 0;

        items.forEach(item => {
          rawSubtotal += item.sectionTotal;
          if (item.type === 'Fixed') { fixedQty += item.q; fixedSqft += item.sqft; }
          else if (item.type === 'Sliding') { slidingQty += item.q; slidingSqft += item.sqft; }
          else if (item.type === 'Door') { doorQty += item.q; doorSqft += item.sqft; }
          else if (item.type === 'Openable') { openableQty += item.q; openableSqft += item.sqft; }
        });

        const totalQty = fixedQty + slidingQty + doorQty + openableQty;
        const totalSqft = fixedSqft + slidingSqft + doorSqft + openableSqft;
        let totalMaterialFt = 0; aggregatedMaterials.forEach(m => totalMaterialFt += m.ft);

        const discountAmount = (rawSubtotal * (parseFloat(billing.discountPct) || 0)) / 100;
        const afterDiscount = rawSubtotal - discountAmount;
        const glassCost = totalSqft * (parseFloat(billing.glassRate) || 0);
        const hwCost = totalQty * (parseFloat(billing.hardwareRate) || 0);
        const laborCost = totalSqft * (parseFloat(billing.laborRate) || 0);
        const addCost = parseFloat(billing.additional) || 0;
        const grandTotal = afterDiscount + glassCost + hwCost + laborCost + addCost;
        const sqftRate = totalSqft > 0 ? (grandTotal / totalSqft) : 0;

        return { 
          rawSubtotal, discountAmount, afterDiscount, totalQty, totalSqft, totalMaterialFt,
          fixedQty, slidingQty, doorQty, openableQty, fixedSqft, slidingSqft, doorSqft, openableSqft, 
          grandTotal, sqftRate, glassCost, hwCost, laborCost 
        };
      }, [items, billing, aggregatedMaterials]);

      const shareToWhatsApp = () => {
        if(items.length === 0) return showToast("Nothing to share!", "error");
        let txt = `*Quotation from ${profile.shopName}*\n`;
        txt += `Contact: ${profile.mobile}\n\n`;
        txt += `*Total Units:* ${totals.totalQty}\n`;
        txt += `*Total Area:* ${totals.totalSqft.toFixed(2)} Sq.Ft\n\n`;
        items.forEach((item, i) => {
          let pallaText = (item.type === 'Door' || item.type === 'Openable') 
             ? ` (${item.panelQty === '2' ? 'Double Palla' : 'Single Palla'})` 
             : '';
          let archText = (item.hasArch && item.ah > 0) ? ` + Arch(${item.ah}ft)` : '';
          txt += `${i+1}. ${item.category} ${item.type}${pallaText}${archText} (${item.specificColor})\n`;
          let totalH = parseFloat(item.h) + (item.ah || 0);
          txt += `Size: ${item.w}' x ${totalH}' | Qty: ${item.q}\n\n`;
        });
        txt += `*Grand Total: Rs ${totals.grandTotal.toFixed(0)}*\n`;
        window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`, '_blank');
      };

      return (
        <div className="min-h-screen bg-slate-100 font-sans pb-28 sm:pb-10 print:bg-white print:pb-0 print:text-black">
          {toast && <Toast message={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
          
          <div className="bg-gradient-to-r from-slate-900 via-teal-900 to-slate-900 text-white pt-8 pb-10 px-6 shadow-2xl rounded-b-[2.5rem] no-print mb-8">
            <h1 className="text-2xl font-black text-center tracking-wide mb-1 drop-shadow-md">Aluminium <span className="text-teal-400">Pro Max</span></h1>
            <p className="text-center text-xs font-bold text-slate-300 uppercase tracking-widest">{activeTab === 'rateManager' ? 'Central Rates Manager' : 'Professional Architecture'}</p>
          </div>

          <div className="max-w-md mx-auto px-4 print:max-w-none print:px-0">
            
            {(activeTab === 'dc' || activeTab === 'dg') && (
              <div className="no-print">

                <div className="mb-6 rounded-3xl overflow-hidden shadow-[0_15px_40px_-10px_rgba(0,0,0,0.15)] border border-slate-200 bg-white">
                  <Visualizer {...input} type={activeTab === 'dg' ? 'Sliding' : input.type} />
                  
                  <div className="p-4 bg-white border-t border-slate-200">
                    <div className="flex justify-between items-center mb-3">
                      <span className="text-[11px] font-black text-slate-500 uppercase tracking-wider">Panel Material</span>
                      <div className="flex gap-2">
                        <button onClick={()=>setInput({...input, panelMaterial: 'Glass'})} className={`px-3 py-1 rounded-full text-[10px] font-bold ${input.panelMaterial==='Glass'?'bg-teal-600 text-white shadow':'bg-slate-100 text-slate-500'}`}>Glass</button>
                        <button onClick={()=>setInput({...input, panelMaterial: 'Sheet'})} className={`px-3 py-1 rounded-full text-[10px] font-bold ${input.panelMaterial==='Sheet'?'bg-teal-600 text-white shadow':'bg-slate-100 text-slate-500'}`}>ACP/Sheet</button>
                      </div>
                    </div>

                    {input.panelMaterial === 'Glass' ? (
                      <div>
                        <div className="flex justify-between items-center mb-2">
                          <span className="text-[10px] font-bold text-slate-400">Glass Colors</span>
                          <div className="flex items-center gap-1">
                            <span className="text-[9px] font-bold text-slate-500">Reflective(Mercury)</span>
                            <div className="relative inline-block w-8 align-middle select-none">
                              <input type="checkbox" checked={input.isMercury} onChange={e => setInput({...input, isMercury: e.target.checked})} className="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-4 border-slate-300 appearance-none cursor-pointer z-10 top-0 left-0" />
                              <label className="toggle-label block overflow-hidden h-4 rounded-full bg-slate-300 cursor-pointer"></label>
                            </div>
                          </div>
                        </div>
                        <div className="flex overflow-x-auto gap-4 pb-2 snap-x">
                          {glassColorOptions.map(gc => (
                            <div key={gc.name} onClick={() => setInput({...input, glassColor: gc.name})} className={`snap-center shrink-0 flex flex-col items-center gap-1.5 cursor-pointer transition-all ${input.glassColor === gc.name ? 'scale-110 opacity-100' : 'opacity-60 hover:opacity-100'}`}>
                              <div className={`w-8 h-8 rounded-full border-2 ${input.glassColor === gc.name ? 'border-teal-500 shadow-md' : 'border-slate-300'} ${gc.bg} bg-gradient-to-br from-white/40 to-transparent`}></div>
                              <span className="text-[9px] font-bold text-slate-700 whitespace-nowrap">{gc.name}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    ) : (
                      <div>
                        <span className="text-[10px] font-bold text-slate-400 mb-2 block">Sheet Colors (DLXBOND/Guardian)</span>
                        <div className="flex overflow-x-auto gap-4 pb-2 snap-x">
                          {sheetColorOptions.map(sc => (
                            <div key={sc.name} onClick={() => setInput({...input, sheetColor: sc.hex})} className={`snap-center shrink-0 flex flex-col items-center gap-1.5 cursor-pointer transition-all ${input.sheetColor === sc.hex ? 'scale-110 opacity-100' : 'opacity-60 hover:opacity-100'}`}>
                              <div className={`w-8 h-8 rounded-sm border-2 ${input.sheetColor === sc.hex ? 'border-teal-500 shadow-md' : 'border-slate-300'}`} style={{backgroundColor: sc.hex}}></div>
                              <span className="text-[9px] font-bold text-slate-700 whitespace-nowrap">{sc.name.split(' ')[0]}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                </div>

                <div className="bg-white rounded-3xl p-6 shadow-xl shadow-slate-200/50 mb-6 border border-slate-100 relative overflow-hidden">
                  
                  {/* ARCH SETTINGS CARD */}
                  {activeTab !== 'dg' && (
                    <div className="bg-sky-50 border border-sky-100 rounded-2xl p-4 mb-5 shadow-sm">
                      <div className="flex justify-between items-center mb-3">
                        <h4 className="text-xs font-black text-sky-800 uppercase tracking-wider">Top Arch (Golai)</h4>
                        <div className="relative inline-block w-10 align-middle select-none">
                          <input type="checkbox" checked={input.hasArch} onChange={e => setInput({...input, hasArch: e.target.checked})} className="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 border-slate-300 appearance-none cursor-pointer z-10 top-0 left-0 transition-all checked:right-0 checked:border-sky-500" />
                          <label className={`toggle-label block overflow-hidden h-5 rounded-full cursor-pointer transition-colors ${input.hasArch?'bg-sky-500':'bg-slate-300'}`}></label>
                        </div>
                      </div>
                      
                      {input.hasArch && (
                        <div className="grid grid-cols-2 gap-3 mt-4 pt-4 border-t border-sky-200/50">
                          <div className="col-span-2">
                            <label className="block text-[10px] font-bold text-sky-700 uppercase mb-1.5">Arch Type</label>
                            <div className="flex bg-white p-1 rounded-xl shadow-sm border border-sky-100">
                                <label className={`flex-1 text-center py-2 rounded-lg cursor-pointer text-[11px] font-bold transition-all ${input.archType === 'Full Round' ? 'bg-sky-500 text-white shadow' : 'text-sky-700 hover:bg-sky-50'}`}>
                                  <input type="radio" checked={input.archType === 'Full Round'} onChange={() => setInput({...input, archType:'Full Round'})} className="hidden" /> Full Round (1/2 Width)
                                </label>
                                <label className={`flex-1 text-center py-2 rounded-lg cursor-pointer text-[11px] font-bold transition-all ${input.archType === 'Kamani' ? 'bg-sky-500 text-white shadow' : 'text-sky-700 hover:bg-sky-50'}`}>
                                  <input type="radio" checked={input.archType === 'Kamani'} onChange={() => setInput({...input, archType:'Kamani'})} className="hidden" /> Kamani (Custom H)
                                </label>
                            </div>
                          </div>
                          
                          {input.archType === 'Kamani' && (
                            <div className="col-span-2">
                               <label className="block text-[10px] font-bold text-sky-700 uppercase mb-1.5">Arch Height (Ft)</label>
                               <input type="number" value={input.archHeight} onChange={e => setInput({...input, archHeight: e.target.value})} placeholder="e.g 1.5" className="w-full bg-white border border-sky-100 rounded-xl p-2.5 text-slate-800 font-bold focus:outline-none focus:ring-2 focus:ring-sky-500 shadow-sm" />
                            </div>
                          )}

                          <div>
                            <label className="block text-[10px] font-bold text-sky-700 uppercase mb-1.5">Arch Frame</label>
                            <div className="relative">
                              <select value={input.archFrame} onChange={e => setInput({...input, archFrame: e.target.value})} className="w-full bg-white border border-sky-100 rounded-xl p-2.5 text-slate-800 text-xs font-bold appearance-none shadow-sm focus:ring-2 focus:ring-sky-500">
                                <option value="D-54A">D-54A</option><option value="D-54F">D-54F</option><option value="D-51A">D-51A</option><option value="D-51F">D-51F</option><option value="D-42">D-42</option><option value="D-42F">D-42F</option>
                              </select>
                              <div className="absolute right-2 top-2.5 text-sky-400 pointer-events-none"><IconChevronDown /></div>
                            </div>
                          </div>

                          <div>
                            <label className="block text-[10px] font-bold text-sky-700 uppercase mb-1.5">Thickness</label>
                            <div className="relative">
                              <select value={input.archThickness} onChange={e => setInput({...input, archThickness: e.target.value})} className="w-full bg-white border border-sky-100 rounded-xl p-2.5 text-slate-800 text-xs font-bold appearance-none shadow-sm focus:ring-2 focus:ring-sky-500">
                                <option>1.2mm</option><option>1.6mm</option><option>2.0mm</option>
                              </select>
                              <div className="absolute right-2 top-2.5 text-sky-400 pointer-events-none"><IconChevronDown /></div>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  )}

                  <div className="flex gap-4 mb-5">
                    <div className="flex-1">
                      <label className="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Structure Type</label>
                      {activeTab === 'dc' ? (
                        <div className="grid grid-cols-4 gap-1 bg-slate-100 p-1.5 rounded-xl">
                            {['Fixed', 'Sliding', 'Door', 'Openable'].map(t => (
                              <label key={t} className={`text-center py-2 rounded-lg cursor-pointer text-[11px] sm:text-xs font-bold transition-all ${input.type === t ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500 hover:text-slate-700'}`}>
                                <input type="radio" checked={input.type === t} onChange={() => setInput({...input, type:t, thickness: t==='Sliding'?'1.2mm*75mm':'1.2mm', dividerType: t==='Sliding'?'M-24A':(t==='Door'?'D-52':'D-40')})} className="hidden" /> {t}
                              </label>
                            ))}
                        </div>
                      ) : (
                        <div className="grid grid-cols-2 gap-1 bg-slate-100 p-1.5 rounded-xl w-1/2">
                            <label className="text-center py-2 rounded-lg cursor-pointer text-[11px] sm:text-xs font-bold bg-white shadow-sm text-slate-800"><input type="radio" checked={true} readOnly className="hidden" /> Sliding</label>
                        </div>
                      )}
                    </div>
                  </div>

                  {activeTab === 'dc' && input.type === 'Fixed' && (
                    <div className="mb-5"><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5 ml-1">Fixed Frame</label><div className="relative"><select value={input.fixedFrame} onChange={e => setInput({...input, fixedFrame: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-800 font-bold focus:outline-none focus:ring-2 focus:ring-teal-50 appearance-none"><option value="D-54F">D-54F</option><option value="D-51F">D-51F</option><option value="D-54A">D-54A</option><option value="D-51A">D-51A</option><option value="D-42F">D-42F</option><option value="D-42">D-42</option></select><div className="absolute right-3 top-3.5 text-slate-400 pointer-events-none"><IconChevronDown /></div></div></div>
                  )}
                  {activeTab === 'dc' && input.type === 'Openable' && (
                    <div className="grid grid-cols-2 gap-3 mb-5"><div><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5 ml-1">Frame</label><div className="relative"><select value={input.openableFrame} onChange={e => setInput({...input, openableFrame: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-800 font-bold focus:outline-none focus:ring-2 focus:ring-teal-50 appearance-none"><option value="D-54F">D-54F</option><option value="D-51F">D-51F</option><option value="D-42F">D-42F</option><option value="D-54A">D-54A</option><option value="D-51A">D-51A</option><option value="D-42">D-42</option></select><div className="absolute right-3 top-3.5 text-slate-400 pointer-events-none"><IconChevronDown /></div></div></div><div><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5 ml-1">Palla</label><div className="relative"><select value={input.openablePalla} onChange={e => setInput({...input, openablePalla: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-800 font-bold focus:outline-none focus:ring-2 focus:ring-teal-50 appearance-none"><option value="D-50A">D-50A</option><option value="D-50">D-50</option><option value="D-50B">D-50B</option></select><div className="absolute right-3 top-3.5 text-slate-400 pointer-events-none"><IconChevronDown /></div></div></div></div>
                  )}
                  {activeTab === 'dc' && input.type === 'Door' && (
                    <div className="grid grid-cols-2 gap-3 mb-5">
                      <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5 ml-1">Frame</label><div className="relative"><select value={input.doorFrame} onChange={e => setInput({...input, doorFrame: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-800 font-bold focus:outline-none focus:ring-2 focus:ring-teal-50 appearance-none"><option value="D-54F">D-54F</option><option value="D-51F">D-51F</option><option value="D-54A">D-54A</option><option value="D-51A">D-51A</option></select><div className="absolute right-3 top-3.5 text-slate-400 pointer-events-none"><IconChevronDown /></div></div></div>
                      <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5 ml-1">Palla</label><div className="relative"><select value={input.doorPalla} onChange={e => setInput({...input, doorPalla: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-800 font-bold focus:outline-none focus:ring-2 focus:ring-teal-50 appearance-none"><option value="D-50A">D-50A</option><option value="D-50">D-50</option><option value="D-50B">D-50B</option></select><div className="absolute right-3 top-3.5 text-slate-400 pointer-events-none"><IconChevronDown /></div></div></div>
                      <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5 ml-1">Mid Rail</label><div className="relative"><select value={input.doorMidRail} onChange={e => setInput({...input, doorMidRail: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-800 font-bold appearance-none"><option value="D-52">D-52</option><option value="D-46">D-46</option></select><div className="absolute right-3 top-3.5 text-slate-400 pointer-events-none"><IconChevronDown /></div></div></div>
                      <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1.5 ml-1">Bottom Rail</label><div className="relative"><select value={input.doorBottomRail} onChange={e => setInput({...input, doorBottomRail: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-800 font-bold appearance-none"><option value="D-46">D-46</option><option value="D-58">D-58</option><option value="D-57">D-57</option></select><div className="absolute right-3 top-3.5 text-slate-400 pointer-events-none"><IconChevronDown /></div></div></div>

                            <option value="DG-26 F">DG-26 F</option>
                            <option value="DG-26">DG-26</option>
                            <option value="DG-26A">DG-26A</option>
                          </select>
                          <div className="absolute right-3 top-3.5 text-slate-400 pointer-events-none"><IconChevronDown /></div>
                        </div>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5 ml-1">DG Palla</label>
                        <div className="relative">
                          <select value={input.dgPalla} onChange={e => setInput({...input, dgPalla: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-800 font-bold appearance-none">
                            <option value="DG-23">DG-23</option>
                            <option value="DG-23A">DG-23A</option>
                          </select>
                          <div className="absolute right-3 top-3.5 text-slate-400 pointer-events-none"><IconChevronDown /></div>

                    <div className="mb-5"><label className="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Track Quantity</label><div className="flex bg-slate-100 p-1.5 rounded-xl w-1/2"><label className={`flex-1 text-center py-2 rounded-lg cursor-pointer text-sm font-bold transition-all ${input.palla === '2' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500 hover:text-slate-700'} `}><input type="radio" checked={input.palla === '2'} onChange={() => setInput({...input, palla:'2'})} className="hidden" /> 2 Track</label>{activeTab === 'dc' && (<label className={`flex-1 text-center py-2 rounded-lg cursor-pointer text-sm font-bold transition-all ${input.palla === '3' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500 hover:text-slate-700'} `}><input type="radio" checked={input.palla === '3'} onChange={() => setInput({...input, palla:'3'})} className="hidden" /> 3 Track</label>)}</div></div>
                  )}

                    <div className="mb-5">

                        </label>

                          <input type="radio" checked={input.panelQty === '2'} onChange={() => setInput({...input, panelQty:'2'})} className="hidden" /> Double Palla
                        </label>
                      </div>
                    </div>

                  <div className="grid grid-cols-2 gap-3 mb-6 bg-slate-50 p-3 rounded-2xl border border-slate-200">
                    <div>
                      <label className="block text-[10px] font-black text-slate-600 uppercase mb-1.5 ml-1">Pricing Category</label>
                      <div className="relative">

                          {Object.keys(catalogColors).map(cat => <option key={cat}>{cat}</option>)}
                        </select>
                        <div className="absolute right-3 top-3.5 text-slate-400 pointer-events-none"><IconChevronDown /></div>
                      </div>
                    </div>
                    <div>
                      <label className="block text-[10px] font-black text-slate-600 uppercase mb-1.5 ml-1">Specific Shade</label>

                        <select value={input.specificColor} onChange={e => setInput({...input, specificColor: e.target.value})} className="w-full bg-white border border-slate-200 rounded-xl p-3 text-slate-800 text-sm font-bold focus:outline-none focus:ring-2 focus:ring-teal-500 appearance-none shadow-sm">
                          {catalogColors[input.colorCategory].map(color => <option key={color}>{color}</option>)}
                        </select>
                        <div className="absolute right-3 top-3.5 text-slate-400 pointer-events-none"><IconChevronDown /></div>
                      </div>
                    </div>
                  </div>

                  <div className="mb-6">

                      <select value={input.thickness} onChange={e => setInput({...input, thickness: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 text-slate-800 font-bold focus:outline-none focus:ring-2 focus:ring-teal-500 focus:bg-white appearance-none transition-all shadow-sm">
                        {activeTab === 'dg' ? (
                          <><option>1.2mm*100mm</option><option>1.6mm*100mm</option><option>2.0mm*100mm</option></>
                        ) : input.type === 'Door' || input.type === 'Fixed' || input.type === 'Openable' ? (
                          <><option>1.2mm</option><option>1.6mm</option><option>2.0mm</option></>
                        ) : (
                          <><option>1.2mm*75mm</option><option>1.6mm*75mm</option><option>2.0mm*75mm</option><option>1.2mm*75mm F</option><option>1.6mm*75mm F</option><option>2.0mm*75mm F</option><option>1.2mm*95mm</option><option>1.6mm*95mm</option><option>2.0mm*95mm</option><option>1.2mm*100mm</option><option>1.6mm*100mm</option><option>2.0mm*100mm</option><option>1.2mm*100mm F</option><option>1.6mm*100mm F</option><option>2.0mm*100mm F</option><option>1.2mm*100mm C</option><option>1.6mm*100mm C</option><option>2.0mm*100mm C</option></>
                        )}
                      </select>
                      <div className="absolute right-4 top-4 text-slate-400 pointer-events-none"><IconChevronDown /></div>
                    </div>
                  </div>

                  <div className="bg-slate-50 border border-slate-200 rounded-xl p-4 mb-5 shadow-sm">
                    <h4 className="text-[11px] font-black text-slate-500 uppercase tracking-wider mb-3">Design Dividers (Grilles)</h4>
                    <div className="grid grid-cols-3 gap-3">
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Horiz. (W)</label>
                        <input type="number" value={input.dividerWQty} onChange={e => setInput({...input, dividerWQty: e.target.value})} placeholder="Qty" className="w-full bg-white border border-slate-200 rounded-lg p-2.5 text-sm font-bold text-slate-800 focus:ring-2 focus:ring-teal-500 outline-none" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Vert. (H)</label>
                        <input type="number" value={input.dividerHQty} onChange={e => setInput({...input, dividerHQty: e.target.value})} placeholder="Qty" className="w-full bg-white border border-slate-200 rounded-lg p-2.5 text-sm font-bold text-slate-800 focus:ring-2 focus:ring-teal-500 outline-none" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Type</label>
                        <div className="relative">
                          <select value={input.dividerType} onChange={e => setInput({...input, dividerType: e.target.value})} className="w-full bg-white border border-slate-200 rounded-lg p-2.5 text-sm font-bold text-slate-800 focus:ring-2 focus:ring-teal-500 outline-none appearance-none">
                            {input.type === 'Sliding' ? (
                              <><option value="M-24A">M-24A</option><option value="M-24F">M-24F</option><option value="J.B">J.B</option><option value="D-59A">D-59A</option></>
                            ) : input.type === 'Door' ? (
                              <><option value="D-52">D-52</option><option value="D-46">D-46</option><option value="D-59A">D-59A</option></>
                            ) : (
                              <><option value="D-40">D-40</option><option value="D-59">D-59</option><option value="D-59A">D-59A</option><option value="D-52">D-52</option></>
                            )}
                          </select>
                          <div className="absolute right-2 top-3 text-slate-400 pointer-events-none"><IconChevronDown /></div>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-3 gap-3 mb-6">

                    <InputField label="Main H (ft)" type="number" value={input.h} onChange={v => setInput({...input, h: v})} placeholder="e.g. 4" />
                    <InputField label="Qty" type="number" value={input.qty} onChange={v => setInput({...input, qty: v})} placeholder="e.g. 1" />
                  </div>
