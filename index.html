                    <IconPlus /> Add {activeTab === 'dg' ? 'DG' : 'DC'} Element
                  </button>
                </div>

                {items.length > 0 && <h3 className="font-extrabold text-slate-800 mb-3 px-2 text-lg">Added Elements</h3>}
                {items.map((item) => (
                  <div key={item.id} className="bg-white border border-slate-100 rounded-2xl shadow-sm mb-4 overflow-hidden flex flex-row transition-all hover:shadow-md h-32">

                      <Visualizer {...item} type={item.category === 'DG' ? 'Sliding' : item.type} mini={true} />
                    </div>
                    <div className="w-2/3 flex flex-col justify-between p-1">
                      <div className="px-3 py-1 flex justify-between items-start">
                        <div className="truncate">
                          <h3 className="font-bold text-slate-800 leading-tight text-sm truncate">
                            {item.category} {item.type}
                            {(item.type === 'Door' || item.type === 'Openable') && <span className="text-teal-600 text-[10px] ml-1">({item.panelQty === '2' ? 'Double' : 'Single'})</span>}
                            {(item.hasArch && item.ah > 0) && <span className="text-sky-600 text-[10px] ml-1">+Arch</span>}
                          </h3>
                          <p className="text-[9px] text-slate-500 font-medium mt-0.5 truncate">
                            {item.specificColor} | {item.panelMaterial === 'Sheet' ? `ACP/Sheet` : `${item.glassColor} Glass`}
                          </p>
                          {(item.dividerWQty > 0 || item.dividerHQty > 0) && (
                            <p className="text-[9px] text-blue-600 font-bold mt-0.5 truncate">
                              + Grille: {item.dividerWQty || 0}W × {item.dividerHQty || 0}H ({item.dividerType})
                            </p>
                          )}
                        </div>
                        <button onClick={() => removeItem(item.id)} className="text-rose-400 hover:text-rose-600 p-1"><IconTrash /></button>
                      </div>
                      <div className="mx-2 mb-2 px-3 py-1.5 flex justify-between text-[11px] font-bold text-slate-700 bg-slate-100 rounded-lg">
                        <span>{item.w}' × {(parseFloat(item.h)+(item.ah||0)).toFixed(1)}' <span className="text-slate-300 mx-1">|</span> Qty: {item.q}</span>
                        <span>{item.sqft.toFixed(1)} Sq.Ft</span>
                      </div>
                    </div>
                  </div>
                ))}

                {/* MATERIAL & COSTING */}
                {aggregatedMaterials.length > 0 && (
                  <div className="bg-white border border-slate-100 rounded-3xl shadow-xl mb-8 overflow-hidden mt-8">
                    <div className="bg-slate-800 p-4">
                      <h3 className="font-bold text-white tracking-wide">Overall Material Required</h3>
                    </div>
                    <div className="overflow-x-auto">
                      <table className="w-full text-sm">
                        <thead className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                          <tr><th className="p-3 text-left font-bold">Section</th><th className="p-3 text-center font-bold">Rate</th><th className="p-3 text-center font-bold">Total Ft</th><th className="p-3 text-right font-bold">Amount</th></tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                          {aggregatedMaterials.map((m, i) => (
                            <tr key={i} className="hover:bg-slate-50 transition-colors">
                              <td className="p-3 text-slate-800 font-bold">{m.section}</td>
                              <td className="p-3 text-center text-slate-600">{m.rate.toFixed(1)}</td>
                              <td className="p-3 text-center text-slate-600">{m.ft.toFixed(1)}</td>
                              <td className="p-3 text-right text-slate-900 font-black">Rs {m.amount.toFixed(0)}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                    <div className="bg-slate-100 p-4 text-right font-black text-slate-900 text-sm border-t border-slate-200">
                      Overall Subtotal: Rs {totals.rawSubtotal.toFixed(0)}
                    </div>
                  </div>
                )}

                {items.length > 0 && (
                  <div className="bg-white border border-slate-100 rounded-3xl p-5 sm:p-6 shadow-2xl mb-6 mt-8">
                    <h2 className="text-xl font-black text-slate-800 mb-5 pb-3 border-b border-slate-100">Final Costing Options</h2>
                    
                    <div className="space-y-4 text-sm font-medium text-slate-600">
                      <div className="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <span>Material Amount</span>
                        <span className="font-black text-slate-800 text-base">Rs {totals.rawSubtotal.toFixed(0)}</span>
                      </div>
                      
                      <div className="flex justify-between items-center px-1">
                        <span>Discount (%)</span>
                        <input type="number" value={billing.discountPct} onChange={e => setBilling({...billing, discountPct: e.target.value})} className="border border-slate-200 rounded-lg w-24 text-right bg-white p-2 focus:ring-2 focus:ring-teal-500 outline-none shadow-sm font-bold text-slate-800" />
                      </div>

                      {billing.discountPct > 0 && (
                        <div className="flex justify-between items-center bg-emerald-50 p-2.5 rounded-xl border border-emerald-100 -mx-1 px-3 mt-2">
                          <span className="text-emerald-700 font-bold">After Discount Amount</span>
                          <span className="font-black text-emerald-800 text-base">Rs {totals.afterDiscount.toFixed(0)}</span>
                        </div>
                      )}

                      <div className="h-px bg-slate-100 my-4"></div>
                      
                      <div className="flex justify-between items-center px-1">
                        <div className="flex flex-col">
                          <span>Glass/Sheet Rate <span className="text-xs text-slate-400 font-normal">(/Sq.ft)</span></span>
                          {billing.glassRate && <span className="text-xs text-slate-600 font-bold mt-0.5">Total: Rs {totals.glassCost.toFixed(0)}</span>}
                        </div>
                        <input type="number" value={billing.glassRate} onChange={e => setBilling({...billing, glassRate: e.target.value})} className="border border-slate-200 rounded-lg w-24 text-right bg-white p-2 focus:ring-2 focus:ring-teal-500 outline-none shadow-sm font-bold text-slate-800" />
                      </div>

                      <div className="flex justify-between items-center px-1">
                        <div className="flex flex-col">
                          <span>Hardware <span className="text-xs text-slate-400 font-normal">(/Item)</span></span>
                          {billing.hardwareRate && <span className="text-xs text-slate-600 font-bold mt-0.5">Total: Rs {totals.hwCost.toFixed(0)}</span>}
                        </div>
                        <input type="number" value={billing.hardwareRate} onChange={e => setBilling({...billing, hardwareRate: e.target.value})} className="border border-slate-200 rounded-lg w-24 text-right bg-white p-2 focus:ring-2 focus:ring-teal-500 outline-none shadow-sm font-bold text-slate-800" />
                      </div>

                      <div className="flex justify-between items-center px-1">
                        <div className="flex flex-col">
                          <span>Labor Rate <span className="text-xs text-slate-400 font-normal">(/Sq.ft)</span></span>
                          {billing.laborRate && <span className="text-xs text-slate-600 font-bold mt-0.5">Total: Rs {totals.laborCost.toFixed(0)}</span>}
                        </div>
                        <input type="number" value={billing.laborRate} onChange={e => setBilling({...billing, laborRate: e.target.value})} className="border border-slate-200 rounded-lg w-24 text-right bg-white p-2 focus:ring-2 focus:ring-teal-500 outline-none shadow-sm font-bold text-slate-800" />
                      </div>

                      <div className="flex justify-between items-center px-1">
                        <span>Additional Charges (+)</span>
                        <input type="number" value={billing.additional} onChange={e => setBilling({...billing, additional: e.target.value})} className="border border-slate-200 rounded-lg w-24 text-right bg-white p-2 focus:ring-2 focus:ring-teal-500 outline-none shadow-sm font-bold text-slate-800" />
                      </div>
                    </div>

                    <div className="bg-slate-900 rounded-[1.25rem] p-5 text-slate-300 mt-6 shadow-xl mb-5">
                      <div className="grid grid-cols-2 gap-y-3 gap-x-2 text-sm font-medium border-b border-slate-700 pb-4 mb-4">
                        <div className="flex justify-between pr-3 border-r border-slate-700"><span>Fixed Qty:</span> <span className="text-white font-bold">{totals.fixedQty}</span></div><div className="flex justify-between pl-1"><span>Fixed SqFt:</span> <span className="text-white font-bold">{totals.fixedSqft.toFixed(1)}</span></div>
                        <div className="flex justify-between pr-3 border-r border-slate-700"><span>Sliding Qty:</span> <span className="text-white font-bold">{totals.slidingQty}</span></div><div className="flex justify-between pl-1"><span>Sliding SqFt:</span> <span className="text-white font-bold">{totals.slidingSqft.toFixed(1)}</span></div>
                        <div className="flex justify-between pr-3 border-r border-slate-700"><span>Door Qty:</span> <span className="text-white font-bold">{totals.doorQty}</span></div><div className="flex justify-between pl-1"><span>Door SqFt:</span> <span className="text-white font-bold">{totals.doorSqft.toFixed(1)}</span></div>
                        <div className="flex justify-between pr-3 border-r border-slate-700"><span>Openable Qty:</span> <span className="text-white font-bold">{totals.openableQty}</span></div><div className="flex justify-between pl-1"><span>Openable SqFt:</span> <span className="text-white font-bold">{totals.openableSqft.toFixed(1)}</span></div>
                      </div>
                      <div className="flex justify-between items-center mb-2 text-[15px] font-medium"><span className="text-slate-300">Total Area:</span> <span className="text-white font-bold">{totals.totalSqft.toFixed(1)} Sq.Ft</span></div>
                      <div className="flex justify-between items-center mb-6 text-[15px] font-medium"><span className="text-slate-300">Avg. Rate/Sq.Ft:</span> <span className="text-emerald-400 font-bold">Rs {totals.sqftRate.toFixed(0)}</span></div>
                      <div className="flex justify-between items-center pt-5 border-t border-slate-700"><span className="text-xl font-bold text-white tracking-wide">Grand Total</span><span className="text-[2rem] font-black text-emerald-400">Rs {totals.grandTotal.toFixed(0)}</span></div>
                    </div>

                    <div className="flex flex-col gap-3">
                      <button onClick={shareToWhatsApp} className="w-full bg-[#25D366] hover:bg-[#128C7E] text-white py-4 rounded-xl font-bold flex justify-center items-center gap-2 shadow-lg transition-colors">
                        <IconShare /> Share Quote via WhatsApp
                      </button>
                      <div className="flex gap-3">
                        <button onClick={() => window.print()} className="flex-[2] bg-slate-800 hover:bg-slate-900 text-white py-4 rounded-xl font-bold flex justify-center items-center gap-2 shadow-lg transition-colors">
                          <IconPDF /> Generate PDF
                        </button>
                        <button onClick={() => {if(window.confirm("Clear all items?")){setItems([]); setBilling({discountPct:'', glassRate:'', hardwareRate:'', laborRate:'', additional:''})}}} className="flex-1 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-xl font-bold transition-colors py-4">
                          Clear
                        </button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {activeTab === 'rateManager' && (
              <div className="no-print h-full pb-10">
                <div className="bg-white p-6 rounded-3xl shadow-xl border border-slate-100 mb-6">
                  <h2 className="text-xl font-black text-slate-800 mb-2">Pro Sync Options</h2>
                  <p className="text-xs text-slate-500 font-medium mb-5">HTML apps cannot sync automatically via internet without a server. Use these Pro Tools to share rates with friends offline!</p>
                  
                  <div className="grid grid-cols-2 gap-3 mb-4">
                    <button onClick={exportRates} className="flex flex-col items-center justify-center p-4 bg-teal-50 hover:bg-teal-100 text-teal-700 rounded-2xl transition-colors font-bold text-sm border border-teal-200">
                      <IconCopy />
                      <span className="mt-2">1. Export Code</span>
                      <span className="text-[9px] font-normal mt-1 opacity-70">(Send to friends)</span>
                    </button>
                    <button onClick={importRates} className="flex flex-col items-center justify-center p-4 bg-slate-50 hover:bg-slate-100 text-slate-700 rounded-2xl transition-colors font-bold text-sm border border-slate-200">
                      <IconSave />
                      <span className="mt-2">2. Import Code</span>
                      <span className="text-[9px] font-normal mt-1 opacity-70">(Paste from friend)</span>
                    </button>
                  </div>
                </div>

                <div className="bg-white p-6 rounded-3xl shadow-xl border border-slate-100">
                  <div className="flex justify-between items-start mb-6">
                    <div>
                      <div className="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center text-slate-800 mb-4"><IconEdit /></div>
                      <h2 className="text-xl font-black text-slate-800 mb-1">Manual Rates</h2>
                    </div>
                    <button onClick={resetRatesToDefault} className="text-[10px] flex items-center gap-1 font-bold bg-rose-50 text-rose-600 px-3 py-2 rounded-lg hover:bg-rose-100 transition-colors">
                      <IconRefresh /> Reset Official
                    </button>
                  </div>
                  
                  <label className="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Select Section</label>
                  <div className="relative mb-6">
                    <select value={editSection} onChange={e => setEditSection(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-slate-800 font-bold focus:outline-none focus:ring-2 focus:ring-teal-500 appearance-none shadow-sm">
                      {Object.keys(rateList).sort().map(sec => <option key={sec} value={sec}>{sec}</option>)}
                    </select>
                    <div className="absolute right-4 top-4 text-slate-400"><IconChevronDown /></div>
                  </div>

                  <div className="space-y-3 pt-2">
                    {Object.keys(rateList[editSection] || {}).map(color => (
                      <div key={color} className="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <span className="text-sm font-bold text-slate-700">{color}</span>
                        <div className="flex items-center gap-2">
                          <span className="text-xs font-bold text-slate-400">Rs</span>
                          <input type="number" value={rateList[editSection][color]} onChange={(e) => handleRateChange(editSection, color, e.target.value)} className="border border-slate-200 rounded-lg w-24 text-right p-2 bg-white focus:ring-2 focus:ring-teal-500 outline-none font-bold text-slate-800 shadow-sm" />
                        </div>
                      </div>
                    ))}
                  </div>
                  <button onClick={() => {
                    localStorage.setItem('alumAppRatesDataV4', JSON.stringify(rateList));
                    showToast(`${editSection} rates saved on device!`);
                  }} className="w-full mt-8 bg-slate-900 text-white font-bold py-4 rounded-xl flex justify-center items-center gap-2 shadow-xl hover:bg-slate-800 transition-colors">
                    <IconSave /> Save to Device
                  </button>
                </div>
              </div>
            )}

            {activeTab === 'settings' && (
              <div className="no-print h-full pb-10">
                <div className="bg-white p-6 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100">
                  <div className="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center text-slate-800 mb-4"><IconUser /></div>
                  <h2 className="text-xl font-black text-slate-800 mb-6">Business Profile</h2>
                  <div className="space-y-1">
                    <InputField label="Your Name" value={profile.name} onChange={v => setProfile({...profile, name: v})} />
                    <InputField label="Mobile Number" type="tel" value={profile.mobile} onChange={v => setProfile({...profile, mobile: v})} />
                    <InputField label="Shop Name" value={profile.shopName} onChange={v => setProfile({...profile, shopName: v})} />
                    <InputField label="Shop Contact" type="tel" value={profile.shopContact} onChange={v => setProfile({...profile, shopContact: v})} />
                    <div className="mb-4 pt-1">
                      <label className="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Shop Address</label>
                      <textarea value={profile.address} onChange={e => setProfile({...profile, address: e.target.value})} rows="3" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 text-slate-800 font-medium focus:outline-none focus:ring-2 focus:ring-teal-500 shadow-sm" />
                    </div>
                  </div>
                  <button onClick={() => {
                      localStorage.setItem('alumAppProfileData', JSON.stringify(profile));
                      showToast("Profile Saved Successfully!"); 
                      setTimeout(() => setActiveTab('dc'), 1000);
                  }} className="w-full mt-4 bg-slate-900 text-white font-bold py-4 rounded-xl shadow-xl hover:bg-slate-800 transition-colors">Save Profile</button>
                </div>
              </div>
            )}

            <div className="print-only max-w-[210mm] mx-auto min-h-screen bg-white text-slate-900 pb-10">
              
              <div className="bg-slate-900 text-white p-8 rounded-2xl shadow-sm mb-6 flex justify-between items-center print:bg-slate-800">
                <div>
                  <h1 className="text-4xl font-black uppercase tracking-widest">{profile.shopName || 'ALUMINIUM SHOP'}</h1>
                  <p className="text-slate-300 text-lg mt-1 font-medium">{profile.address}</p>
                </div>
                <div className="text-right">
                  <p className="font-bold text-xl mb-1">{profile.name}</p>
                  <p className="text-slate-300 font-medium text-lg">{profile.mobile} <br/> {profile.shopContact}</p>
                </div>
              </div>

              <div className="bg-slate-50 p-5 rounded-xl flex justify-between items-center text-slate-800 font-bold mb-8 text-base border-l-4 border-slate-800 print:bg-slate-50">
                <div className="flex flex-col"><span className="text-xs text-slate-500 uppercase tracking-wider">Invoice Date</span><span className="text-lg">{new Date().toLocaleDateString()}</span></div>
                <div className="flex flex-col items-center"><span className="text-xs text-slate-500 uppercase tracking-wider">Total Items</span><span className="text-lg">{totals.totalQty} Units</span></div>
                <div className="flex flex-col items-center"><span className="text-xs text-slate-500 uppercase tracking-wider">Total Area</span><span className="text-lg text-slate-900">{totals.totalSqft.toFixed(2)} Sq.Ft</span></div>
                <div className="flex flex-col items-end"><span className="text-xs text-slate-500 uppercase tracking-wider">Total Material</span><span className="text-lg">{totals.totalMaterialFt.toFixed(1)} Run.Ft</span></div>
              </div>
              
              <h3 className="font-black text-slate-800 mb-3 text-xl px-2">Structures & Designs Breakdown</h3>
              <div className="grid grid-cols-2 gap-4 mb-8">
                {items.map((item, idx) => (
                  <div key={idx} className="bg-white avoid-break border border-slate-200 rounded-xl p-3 flex gap-4 items-center h-48 overflow-hidden">
                    <div className="w-1/3 flex justify-center items-center h-full p-1 bg-blueprint rounded-lg overflow-hidden border border-slate-800">
                       <Visualizer {...item} id={`${item.id}-print`} type={item.category === 'DG' ? 'Sliding' : item.type} mini={true} />
                    </div>
                    <div className="w-2/3 text-sm flex flex-col justify-center">
                       <h4 className="font-bold text-slate-900 text-base mb-1 leading-tight truncate">
                         {item.category} {item.type}
                         {(item.type === 'Door' || item.type === 'Openable') && <span className="text-teal-600 font-medium text-[11px] ml-1">({item.panelQty === '2' ? 'Double' : 'Single'})</span>}
                         {(item.hasArch && item.ah > 0) && <span className="text-sky-600 text-[11px] font-bold ml-1">+Arch</span>}
                       </h4>
                       <p className="text-slate-600 mb-1 text-xs truncate">
                         <span className="font-bold text-slate-800">{item.specificColor}</span>
                       </p>
                       <p className="text-slate-600 mb-1 text-xs truncate">
                         <span className="text-slate-800 font-bold">{item.panelMaterial === 'Sheet' ? 'ACP/Sheet Panel' : `${item.glassColor} Glass`}</span>
                       </p>
                       {(item.dividerWQty > 0 || item.dividerHQty > 0) && (
                         <p className="text-[9px] text-slate-600 font-bold mb-1 truncate">
                           + Grille: {item.dividerWQty || 0}W × {item.dividerHQty || 0}H ({item.dividerType})
                         </p>
                       )}
                       <div className="flex justify-between items-center bg-slate-50 p-2 rounded-lg border border-slate-100 text-xs mt-2">
                         <span className="font-bold text-slate-700">{item.w}' × {(parseFloat(item.h)+(item.ah||0)).toFixed(1)}'</span>
                         <span className="font-black text-slate-900">{item.sqft.toFixed(1)} Sq.Ft</span>
                       </div>
                    </div>
                  </div>
                ))}
              </div>

              <h3 className="font-black text-slate-800 mb-3 text-xl px-2 mt-8 avoid-break">Overall Material Requirement & Costing</h3>
              <div className="rounded-xl overflow-hidden border border-slate-200 mb-8 avoid-break">
                <table className="w-full text-base">
                  <thead className="bg-slate-100 print:bg-slate-100">
                    <tr className="text-slate-800 border-b border-slate-200">
                      <th className="p-4 text-left font-bold">Section Profile</th>
                      <th className="p-4 text-center font-bold">Market Rate</th>
                      <th className="p-4 text-center font-bold">Total Running Ft</th>
                      <th className="p-4 text-right font-bold">Total Amount</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-200">
                    {aggregatedMaterials.map((m, idx) => (
                      <tr key={idx} className="bg-white even:bg-slate-50">
                        <td className="p-4 font-bold text-slate-800">{m.section}</td>
                        <td className="p-4 text-center text-slate-600 font-medium">Rs {m.rate.toFixed(1)}</td>
                        <td className="p-4 text-center font-bold text-slate-800">{m.ft.toFixed(1)} ft</td>
                        <td className="p-4 text-right font-black text-slate-900">Rs {m.amount.toFixed(0)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              <div className="flex flex-col sm:flex-row gap-6 mt-8 avoid-break">
                <div className="w-full sm:w-1/2 bg-slate-50 p-6 rounded-2xl border border-slate-200 shadow-sm print:bg-slate-50">
                  <table className="w-full text-base">
                    <tbody className="divide-y divide-slate-200/60">
                      <tr><td className="py-3 text-slate-600 font-medium">Material Subtotal</td><td className="py-3 text-right font-bold text-slate-900">Rs {totals.rawSubtotal.toFixed(0)}</td></tr>
                      {billing.discountPct > 0 && <tr><td className="py-3 text-red-600 font-medium">Discount ({billing.discountPct}%)</td><td className="py-3 text-right text-red-600 font-bold">- Rs {totals.discountAmount.toFixed(0)}</td></tr>}
                      {billing.discountPct > 0 && <tr><td className="py-3 text-slate-800 font-bold">After Discount</td><td className="py-3 text-right font-bold text-slate-900">Rs {totals.afterDiscount.toFixed(0)}</td></tr>}
                      {totals.glassCost > 0 && <tr><td className="py-3 text-slate-600 font-medium">Total Glass/Sheet Cost</td><td className="py-3 text-right font-bold text-slate-800">Rs {totals.glassCost.toFixed(0)}</td></tr>}
                      {totals.hwCost > 0 && <tr><td className="py-3 text-slate-600 font-medium">Total Hardware Cost</td><td className="py-3 text-right font-bold text-slate-800">Rs {totals.hwCost.toFixed(0)}</td></tr>}
                      {totals.laborCost > 0 && <tr><td className="py-3 text-slate-600 font-medium">Total Labor Cost</td><td className="py-3 text-right font-bold text-slate-800">Rs {totals.laborCost.toFixed(0)}</td></tr>}
                      {billing.additional > 0 && <tr><td className="py-3 text-slate-600 font-medium">Additional Charges</td><td className="py-3 text-right font-bold text-slate-800">Rs {parseFloat(billing.additional).toFixed(0)}</td></tr>}
                    </tbody>
                  </table>
                </div>

                <div className="w-full sm:w-1/2 bg-slate-900 rounded-[1.25rem] p-6 text-slate-300 shadow-xl print:bg-[#0f172a] print:text-slate-300 !print:color-adjust-exact" style={{ WebkitPrintColorAdjust: 'exact', printColorAdjust: 'exact' }}>
                  <div className="grid grid-cols-2 gap-y-3 gap-x-2 text-sm font-medium border-b border-slate-700 pb-4 mb-4">
                    <div className="flex justify-between pr-3 border-r border-slate-700"><span>Fixed Qty:</span> <span className="text-white font-bold">{totals.fixedQty}</span></div><div className="flex justify-between pl-1"><span>Fixed SqFt:</span> <span className="text-white font-bold">{totals.fixedSqft.toFixed(1)}</span></div>
                    <div className="flex justify-between pr-3 border-r border-slate-700"><span>Sliding Qty:</span> <span className="text-white font-bold">{totals.slidingQty}</span></div><div className="flex justify-between pl-1"><span>Sliding SqFt:</span> <span className="text-white font-bold">{totals.slidingSqft.toFixed(1)}</span></div>
                    <div className="flex justify-between pr-3 border-r border-slate-700"><span>Door Qty:</span> <span className="text-white font-bold">{totals.doorQty}</span></div><div className="flex justify-between pl-1"><span>Door SqFt:</span> <span className="text-white font-bold">{totals.doorSqft.toFixed(1)}</span></div>
                    <div className="flex justify-between pr-3 border-r border-slate-700"><span>Openable Qty:</span> <span className="text-white font-bold">{totals.openableQty}</span></div><div className="flex justify-between pl-1"><span>Openable SqFt:</span> <span className="text-white font-bold">{totals.openableSqft.toFixed(1)}</span></div>
                  </div>
                  <div className="flex justify-between items-center mb-2 text-[15px] font-medium"><span className="text-slate-300">Total Area:</span> <span className="text-white font-bold">{totals.totalSqft.toFixed(1)} Sq.Ft</span></div>
                  <div className="flex justify-between items-center mb-6 text-[15px] font-medium"><span className="text-slate-300">Avg. Rate/Sq.Ft:</span> <span className="text-white font-bold">Rs {totals.sqftRate.toFixed(0)}</span></div>
                  <div className="flex justify-between items-center pt-5 border-t border-slate-700"><span className="text-xl font-bold text-white tracking-wide">Grand Total</span><span className="text-[2rem] font-black text-white">Rs {totals.grandTotal.toFixed(0)}</span></div>
                </div>
              </div>

              <div className="mt-20 pt-6 text-center text-sm font-bold text-slate-400 border-t border-slate-200">Generated via Aluminium Pro Max (Architect Edition) <br/><span className="font-normal text-xs mt-1 block">Thank you for your business!</span></div>
            </div>

          </div>

          <div className="fixed bottom-4 left-4 right-4 bg-white/90 backdrop-blur-xl border border-slate-200/50 flex justify-between px-2 sm:px-6 py-2 pb-safe no-print sm:max-w-md sm:mx-auto rounded-3xl shadow-[0_10px_40px_-15px_rgba(0,0,0,0.2)] z-50">
            <button onClick={() => setActiveTab('dc')} className={`flex flex-col items-center p-2.5 rounded-2xl transition-all w-14 ${activeTab === 'dc' ? 'text-slate-900 bg-slate-100' : 'text-slate-400 hover:text-slate-600'}`}><IconCalc /><span className="text-[10px] font-bold mt-1.5 whitespace-nowrap">DC Calc</span></button>
            <button onClick={() => setActiveTab('dg')} className={`flex flex-col items-center p-2.5 rounded-2xl transition-all w-14 ${activeTab === 'dg' ? 'text-slate-900 bg-slate-100' : 'text-slate-400 hover:text-slate-600'}`}><IconDG /><span className="text-[10px] font-bold mt-1.5 whitespace-nowrap">DG Calc</span></button>
            <button onClick={() => setActiveTab('rateManager')} className={`flex flex-col items-center p-2.5 rounded-2xl transition-all w-14 ${activeTab === 'rateManager' ? 'text-slate-900 bg-slate-100' : 'text-slate-400 hover:text-slate-600'}`}><IconEdit /><span className="text-[10px] font-bold mt-1.5 whitespace-nowrap">Rates</span></button>
            <button onClick={() => window.print()} className="flex flex-col items-center p-2.5 rounded-2xl text-slate-400 hover:text-slate-900 hover:bg-slate-100 transition-all w-14"><IconPDF /><span className="text-[10px] font-bold mt-1.5 whitespace-nowrap">PDF</span></button>
            <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center p-2.5 rounded-2xl transition-all w-14 ${activeTab === 'settings' ? 'text-slate-900 bg-slate-100' : 'text-slate-400 hover:text-slate-600'}`}><IconUser /><span className="text-[10px] font-bold mt-1.5 whitespace-nowrap">Profile</span></button>
          </div>
        </div>
      );
    }

    const AppWithErrorBoundary = () => (
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppWithErrorBoundary />);
  </script>
</body>
</html>

```
